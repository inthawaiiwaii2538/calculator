<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบคำนวณอัจฉริยะ</title>
    <!-- เชื่อมต่อไฟล์ CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
    <div class="parser-section">
        <textarea id="rawInput" placeholder="คัดลอกบิลมาวางที่นี่..."></textarea>
        <div class="btn-group">
            <button class="btn-parse" onclick="parseAll()">🚀 วิเคราะห์และสรุปยอด</button>
            <button class="btn-clear" onclick="clearAll()">ล้างทั้งหมด</button>
        </div>
    </div>

    <!-- ปุ่มช่วยควบคุมการพับบิล -->
    <div class="controls" style="margin-top: 10px; display: flex; gap: 5px;">
        <button onclick="toggleAllBills(true)" style="font-size: 11px; padding: 5px;">ขยายทั้งหมด</button>
        <button onclick="toggleAllBills(false)" style="font-size: 11px; padding: 5px;">ย่อทั้งหมด</button>
    </div>

    <div id="bill-container">
        <!-- บิลจะถูกสร้างขึ้นที่นี่โดย JavaScript -->
    </div>
</div>

<!-- เชื่อมต่อไฟล์ JavaScript -->
<script src="script.js"></script>
</body>
</html>
